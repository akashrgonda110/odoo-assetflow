# =============================================================================
# AssetFlow — Docker Compose
# Services: db (PostgreSQL 16), backend (Express API), frontend (Next.js)
#
# Usage:
#   Development:  docker compose up --build
#   Detached:     docker compose up --build -d
#   Tear down:    docker compose down -v   (removes volumes too)
#
# Environment:
#   Copy .env.example to .env in the repo root and fill in secrets before
#   running. The compose file reads values from that file via env_file.
# =============================================================================

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: assetflow_db
    restart: unless-stopped

    environment:
      POSTGRES_DB:       ${DB_NAME:-odoo_db}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}

    volumes:
      # Named volume keeps data across container restarts
      - db_data:/var/lib/postgresql/data

    ports:
      # Expose to host only for local tooling (psql, DBeaver, etc.)
      # Remove this mapping in production.
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-odoo_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - assetflow_net


  # ─── Migration runner ────────────────────────────────────────────────────────
  # Runs once on startup to apply schema migrations, then exits (restart: no).
  # The backend service waits for this to complete before starting.
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: assetflow_migrate
    restart: "no"

    command: ["node", "src/database/migrate.js"]

    environment:
      NODE_ENV:    production
      DB_HOST:     db
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME:-odoo_db}
      DB_USER:     ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      # JWT secrets are required by env.js validation at import time
      JWT_ACCESS_SECRET:  ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}

    depends_on:
      db:
        condition: service_healthy

    networks:
      - assetflow_net


  # ─── Backend (Express API) ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: assetflow_backend
    restart: unless-stopped

    environment:
      NODE_ENV:    production
      PORT:        5000
      DB_HOST:     db
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME:-odoo_db}
      DB_USER:     ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_POOL_MIN: ${DB_POOL_MIN:-2}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}

      JWT_ACCESS_SECRET:   ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET:  ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRES_IN:  ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}

      # Allow requests from the frontend container
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}

      COOKIE_SECRET:        ${COOKIE_SECRET:?COOKIE_SECRET is required}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX:       ${RATE_LIMIT_MAX:-100}

    ports:
      - "5000:5000"

    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - assetflow_net


  # ─── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle at build time.
        # For browser-to-backend calls this must be the host-accessible URL.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
    container_name: assetflow_frontend
    restart: unless-stopped

    environment:
      NODE_ENV: production
      PORT:     3000
      HOSTNAME: 0.0.0.0

    ports:
      - "3000:3000"

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    networks:
      - assetflow_net


# =============================================================================
# Volumes
# =============================================================================
volumes:
  db_data:
    driver: local


# =============================================================================
# Networks
# =============================================================================
networks:
  assetflow_net:
    driver: bridge
